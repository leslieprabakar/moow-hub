<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Moow.Hub</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <style>
    .auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:2rem 1rem; }
    .auth-container { width:100%; max-width:440px; }
    .auth-card { background:var(--white); border-radius:var(--radius); padding:2.5rem; box-shadow:var(--shadow); }
    .auth-logo { text-align:center; margin-bottom:2rem; }
    .auth-logo a { font-family:var(--font-serif); font-size:1.8rem; font-weight:700; color:var(--navy); text-decoration:none; }
    .auth-logo .dot { color:var(--primary); }
    .auth-title { font-family:var(--font-serif); font-size:1.5rem; color:var(--navy); text-align:center; margin-bottom:0.5rem; }
    .auth-subtitle { text-align:center; color:var(--text-light); margin-bottom:2rem; font-size:0.95rem; }
    .form-group { margin-bottom:1.25rem; }
    .form-group label { display:block; font-weight:500; margin-bottom:0.5rem; color:var(--navy); font-size:0.9rem; }
    .form-group input { width:100%; padding:0.75rem 1rem; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:1rem; font-family:var(--font-body); color:var(--text); background:var(--white); transition:border-color 0.2s, box-shadow 0.2s; }
    .form-group input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(212,115,94,0.1); }
    .btn-primary { width:100%; padding:0.875rem; background:var(--primary); color:white; border:none; border-radius:var(--radius-sm); font-size:1rem; font-weight:600; cursor:pointer; transition:background 0.2s, transform 0.1s; }
    .btn-primary:hover { background:#c0634e; }
    .btn-primary:disabled { background:#ccc; cursor:not-allowed; }
    .auth-footer { text-align:center; margin-top:1.5rem; color:var(--text-light); font-size:0.9rem; }
    .auth-footer a { color:var(--primary); text-decoration:none; font-weight:500; }
    .auth-footer a:hover { text-decoration:underline; }
    .alert { padding:0.75rem 1rem; border-radius:var(--radius-sm); margin-bottom:1rem; font-size:0.9rem; display:none; }
    .alert-error { background:#fee; color:#dc3545; border:1px solid #fcc; }
    .alert-success { background:#efe; color:#28a745; border:1px solid #cec; }
    .success-state { text-align:center; }
    .success-state h2 { font-family:var(--font-serif); color:var(--navy); margin-bottom:0.5rem; }
    .success-state p { color:var(--text-light); font-size:0.95rem; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <a href="../index.html">Moow<span class="dot">.</span>Hub<sup>&reg;</sup></a>
        </div>

        <div id="formState">
          <h1 class="auth-title">Reset password</h1>
          <p class="auth-subtitle">Enter your new password below.</p>
          <div id="alert" class="alert"></div>
          <form id="resetForm" novalidate>
            <div class="form-group">
              <label for="password">New Password</label>
              <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Min 8 characters, uppercase, number, special char">
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" placeholder="Re-enter your password">
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Reset Password</button>
          </form>
        </div>

        <div id="successState" class="success-state" style="display:none;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#28a745" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l2.5 2.5L16 9"/></svg>
          <h2>Password reset successful</h2>
          <p>Your password has been updated. You can now sign in.</p>
        </div>

        <div class="auth-footer">
          <a href="login.html">Back to Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      if (!token) { showAlert('Invalid or expired reset link.', 'error'); return; }

      const form = document.getElementById('resetForm');
      const alert = document.getElementById('alert');
      const submitBtn = document.getElementById('submitBtn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (!password || !confirmPassword) { showAlert('Please fill in both fields', 'error'); return; }
        if (password !== confirmPassword) { showAlert('Passwords do not match', 'error'); return; }
        if (password.length < 8) { showAlert('Password must be at least 8 characters', 'error'); return; }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Resetting...';

        try {
          const res = await fetch('/api/auth/password-reset-confirm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed to reset password');
          document.getElementById('formState').style.display = 'none';
          document.getElementById('successState').style.display = 'block';
        } catch (error) {
          showAlert(error.message, 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
        }
      });

      function showAlert(message, type) {
        alert.textContent = message;
        alert.className = 'alert alert-' + type;
        alert.style.display = 'block';
      }
    });
  </script>
</body>
</html>
