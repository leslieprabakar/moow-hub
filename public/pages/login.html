<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Moow.Hub</title>
  <meta name="description" content="Sign in to your Moow.Hub account. Access your orders, cart, and wellness journey.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 2rem 1rem;
    }
    .auth-container {
      width: 100%;
      max-width: 440px;
    }
    .auth-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 2.5rem;
      box-shadow: var(--shadow);
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo a {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--navy);
      text-decoration: none;
    }
    .auth-logo .dot {
      color: var(--primary);
    }
    .auth-title {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      color: var(--navy);
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .auth-subtitle {
      text-align: center;
      color: var(--text-light);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--navy);
      font-size: 0.9rem;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-family: var(--font-body);
      color: var(--text);
      background: var(--white);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(212, 115, 94, 0.1);
    }
    .form-group.error input {
      border-color: #dc3545;
    }
    .error-message {
      color: #dc3545;
      font-size: 0.85rem;
      margin-top: 0.35rem;
      display: none;
    }
    .form-group.error .error-message {
      display: block;
    }
    .btn-primary {
      width: 100%;
      padding: 0.875rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover {
      background: #c0634e;
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-light);
      font-size: 0.9rem;
    }
    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
    .auth-divider {
      display: flex;
      align-items: center;
      margin: 1.5rem 0;
      color: var(--text-light);
      font-size: 0.85rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    .auth-divider span {
      padding: 0 1rem;
    }
    .alert {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    .alert-error {
      background: #fee;
      color: #dc3545;
      border: 1px solid #fcc;
    }
    .alert-success {
      background: #efe;
      color: #28a745;
      border: 1px solid #cec;
    }
    .forgot-link {
      text-align: right;
      margin-top: -0.75rem;
      margin-bottom: 1.25rem;
    }
    .forgot-link a {
      color: var(--text-light);
      font-size: 0.85rem;
      text-decoration: none;
    }
    .forgot-link a:hover {
      color: var(--primary);
    }
  </style>
  <!-- Vercel Web Analytics -->
  <script defer src="/_vercel/insights/script.js"></script>

</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-logo">
          <a href="../index.html">Moow<span class="dot">.</span>Hub®</a>
        </div>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to your account</p>

        <div id="alert" class="alert"></div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" required autocomplete="email" placeholder="you@example.com">
            <div class="error-message"></div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
            <div class="error-message"></div>
          </div>

          <div class="forgot-link">
            <a href="forgot-password.html">Forgot password?</a>
          </div>

          <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>
        </form>

        <div class="auth-divider"><span>or</span></div>

        <p class="auth-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <script defer src="../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (Auth.isAuthenticated()) {
        window.location.href = '../index.html';
        return;
      }

      const form = document.getElementById('loginForm');
      const alert = document.getElementById('alert');
      const submitBtn = document.getElementById('submitBtn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        alert.style.display = 'none';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        // Validate
        if (!email || !password) {
          showAlert('Please fill in all fields', 'error');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in...';

        try {
          await Auth.login(email, password);
          showAlert('Login successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '../index.html';
          }, 1000);
        } catch (error) {
          showAlert(error.message, 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      });

      function showAlert(message, type) {
        alert.textContent = message;
        alert.className = 'alert alert-' + type;
        alert.style.display = 'block';
      }
    });
  </script>
</body>
</html>
